version: 2

project_name: brabble

changelog:
  disable: true

builds:
  - id: brabble-darwin
    main: ./cmd/brabble
    binary: brabble
    env:
      - CGO_ENABLED=1
      - CGO_CFLAGS=-I/usr/local/include/whisper
      - CGO_LDFLAGS=-L/usr/local/lib/whisper
    goos:
      - darwin
    goarch:
      - arm64
    hooks:
      post:
        - install_name_tool -add_rpath /usr/local/lib/whisper "{{ .Path }}" || true

  - id: brabble-windows
    main: ./cmd/brabble
    binary: brabble
    env:
      - CGO_ENABLED=1
      - CGO_CFLAGS={{ if index .Env "WHISPER_INC" }}-I{{ .Env.WHISPER_INC }}{{ else }}-IC:/whisper/include{{ end }}
      - CGO_LDFLAGS={{ if index .Env "WHISPER_LIB" }}-L{{ .Env.WHISPER_LIB }}{{ else }}-LC:/whisper/lib{{ end }}
    goos:
      - windows
    goarch:
      - amd64

archives:
  - builds:
      - brabble-darwin
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: windows
    builds:
      - brabble-windows
    format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt
